<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link rel="manifest" href="ui/assets/pwa/manifest-home.json">
    <meta name="theme-color" content="#1e1e2e">
    <script defer src="/ui/home.js"></script>
    <!-- Alpine collapse plugin (registers x-collapse directive) must load BEFORE Alpine core -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>

tent:"";position:fixed;top:0;left:0;width:100%;height:100%;background-image:var(--theme-background);background-image:image-set(url(/ui/assets/themes/night-stars-bg-1280.webp)type("image/webp") 1x,url(/ui/assets/themes/night-stars-bg.webp)type("image/webp") 2x,url(/ui/assets/themes/night-stars-bg-1280.jpg)1x,url(/ui/assets/themes/night-stars-bg.jpg)2x);background-size:cover;background-position:center;background-repeat:no-repeat;filter:blur(0) saturate(110%) brightness(70%);opacity:.4;z-index:-1}body.theme-tokyo-night{--bg-color:#1a1b26;--fg-color:#c0caf5;--card-bg:#24283b;--card-border:#414868;--accent:#7aa2f7;--subtle-color:#565f89;--stat-cpu:#f7768e;--stat-ram:#9ece6a;--stat-disk:#7dcfff;--hover-glow:rgba(122,162,247,0.08)}body.theme-catppuccin-latte{--bg-color:#eff1f5;--fg-color:#4c4f69;--card-bg:rgba(230,233,239,0.45);--card-border:rgba(76,111,179,0.25);--accent:#1e66f5;--subtle-color:#6c6f85;--stat-cpu:#d20f39;--stat-ram:#40a02b;--stat-disk:#04a5e5;--hover-glow:rgba(30,102,245,0.08);--theme-background:url('/ui/assets/themes/catppuccin-latte-bg-1280.jpg')}body.theme-catppuccin-latte::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-image:var(--theme-background);background-image:image-set(url(/ui/assets/themes/catppuccin-latte-bg-1280.webp)type("image/webp") 1x,url(/ui/assets/themes/catppuccin-latte-bg.webp)type("image/webp") 2x,url(/ui/assets/themes/catppuccin-latte-bg-1280.jpg)1x,url(/ui/assets/themes/catppuccin-latte-bg.jpg)2x);background-size:cover;background-position:center;background-repeat:no-repeat;filter:blur(0) saturate(100%) brightness(98%);opacity:.35;z-index:-1}body.theme-nord{--bg-color:#2e3440;--fg-color:#eceff4;--card-bg:rgba(67,76,94,0.4);--card-border:rgba(136,192,208,0.25);--accent:#88c0d0;--subtle-color:#4c566a;--stat-cpu:#bf616b;--stat-ram:#a3be8c;--stat-disk:#88c0d0;--hover-glow:rgba(136,192,208,0.08);--theme-background:url('/ui/assets/themes/nord-bg-1280.jpg')}body,header,footer{transition:background-color .3s ease,color .3s ease,border-color .3s ease}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:var(--subtle-color);border-radius:3px}.link-card{transition:all .2s ease;border-left-width:3px;border-left-style:solid}.link-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--hover-glow);border-left-width:4px;border-left-color:var(--accent)!important}.stat-card{transition:all .25s ease}.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px var(--hover-glow)}.stat-bar{transition:width .6s cubic-bezier(.4,0,.2,1)}.icon-fade-in{opacity:0;transition:opacity .3s ease}.icon-fade-in.loaded{opacity:1}.page-fade{opacity:0;transition:opacity .4s ease}.page-fade.visible{opacity:1}@keyframes shimmer{0%{background-position:-200%0}to{background-position:200%0}}.skeleton-icon{background:linear-gradient(90deg,var(--card-border) 25%,var(--card-bg) 50%,var(--card-border) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}.search-modal-backdrop{position:fixed;inset:0;background-color:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding-top:10vh;z-index:9999}.search-modal{width:100%;max-width:36rem;border-radius:.5rem;border:1px solid var(--card-border);background-color:var(--bg-color);color:var(--fg-color);box-shadow:0 25px 50px -12px rgba(0,0,0,.5);overflow:hidden}.search-input{width:100%;padding:.875rem 1rem;font-size:1rem;background:0 0;border:0;border-bottom:1px solid var(--card-border);color:var(--fg-color);outline:0}.search-input::placeholder{color:var(--subtle-color)}.search-results-list{list-style:none;margin:0;padding:0;max-height:60vh;overflow-y:auto}.search-result{display:flex;align-items:center;gap:.75rem;padding:.625rem 1rem;cursor:pointer;color:var(--fg-color);border-left:3px solid transparent}.search-result:hover,.search-result.selected{background-color:var(--card-bg);border-left-color:var(--accent)}.search-result-meta{font-size:.75rem;color:var(--subtle-color);margin-left:auto;flex-shrink:0}.search-empty{padding:2rem 1rem;text-align:center;color:var(--subtle-color);font-size:.875rem}.search-hint{padding:.5rem 1rem;font-size:.7rem;color:var(--subtle-color);border-top:1px solid var(--card-border);display:flex;justify-content:space-between;gap:1rem}.search-hint kbd{background-color:var(--card-bg);border:1px solid var(--card-border);border-radius:3px;padding:0 4px;font-family:ui-monospace,SFMono-Regular,monospace}
        </style>
</head>
<body x-data="homeApp()" x-init="init()"
      style="background-color: var(--bg-color); color: var(--fg-color); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 17px;"
      x-bind:style="'background-color: var(--bg-color); color: var(--fg-color); font-family: ' + (data?.settings?.fontFamily || 'Inter, system-ui, -apple-system, BlinkMacSystemFont, \'Segoe UI\', Roboto, sans-serif') + '; font-size: ' + (data?.settings?.fontSize || '17px') + ';'">

    <div id="app" x-cloak
         class="flex flex-col h-screen overflow-hidden page-fade"
         :class="pageVisible && 'visible'">

        <!-- Header -->
        <header class="shrink-0 px-4 py-2 border-b flex items-center"
                style="border-color: var(--card-border); background-color: var(--card-bg);">
            <!-- Title font-size is sourced from the runtime CSS variable
                 `--title-font-size`, which _syncRootFont (ui/home.js) sets from
                 data.settings.titleFontSize (falling back to a default that
                 mirrors Go's DefaultTitleFontSize). The `text-xl` Tailwind
                 class is retained as a fallback for the brief moment BEFORE
                 _syncRootFont runs, providing both font-size: 1.25rem and
                 line-height: 1.75rem so the title never flashes unstyled. -->
            <h1 class="text-xl font-bold truncate flex-1"
                style="font-size: var(--title-font-size)"
                x-text="data?.settings?.title || 'Dashboard'"></h1>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">

            <!-- Bookmarks Column (~25-30%) -->
            <section class="w-full md:w-1/3 lg:w-1/4 overflow-y-auto p-2 md:p-3 border-r"
                     style="border-color: var(--card-border);"
                     x-show="data && data.bookmarks && data.bookmarks.length > 0">
                <template x-for="group in data.bookmarks" :key="group.group">
                    <div class="mb-4">
                        <h2 class="mb-2 px-1">
                            <button type="button"
                                    @click="toggleGroup(group.group)"
                                    :aria-expanded="isGroupOpen(group.group) ? 'true' : 'false'"
                                    :aria-controls="'bm-' + $id(group.group)"
                                    class="w-full text-xs font-bold uppercase tracking-wider flex items-center justify-between gap-2 focus:outline-none focus:ring-1 rounded-sm hover:opacity-80 transition-opacity duration-200 ease-out"
                                    style="color: var(--accent);">
                                <span x-text="group.group" class="truncate flex-1 text-left"></span>
                                <svg class="w-3 h-3 shrink-0 transition-transform duration-200 ease-out"
                                     :class="isGroupOpen(group.group) ? 'rotate-180' : 'rotate-0'"
                                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                     aria-hidden="true">
                                    <path d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>
                        </h2>
                        <div :id="'bm-' + $id(group.group)"
                             x-show="isGroupOpen(group.group)"
                             x-collapse
                             class="space-y-1">
                            <template x-for="bm in group.items" :key="bm.url">
                                <a :href="bm.url" target="_blank" rel="noopener"
                                   class="link-card flex items-center justify-between border rounded p-1.5 text-sm no-underline"
                                   style="background-color: var(--card-bg); border-color: var(--card-border); border-left-color: var(--accent); color: var(--fg-color);">
                                    <span class="flex items-center gap-2 truncate">
                                        <span class="font-mono text-xs font-bold shrink-0"
                                              style="color: var(--accent);"
                                              x-text="bm.abbr || bm.name.substring(0,2).toUpperCase()"></span>
                                        <span class="text-xs" style="color: var(--subtle-color);">|</span>
                                        <span class="truncate" x-text="bm.name"></span>
                                    </span>
                                    <span class="text-xs truncate ml-2 shrink-0"
                                          style="color: var(--subtle-color); max-width: 8rem;"
                                          x-text="(new URL(bm.url, window.location.origin)).hostname.replace(/^www\./, '')"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                </template>
            </section>

            <!-- Services Columns (~70-75%) -->
            <section class="w-full md:w-2/3 lg:w-3/4 overflow-y-auto p-2 md:p-3"
                     x-show="data && data.services && data.services.length > 0">
                <div class="flex flex-col lg:flex-row gap-4">
                    <template x-for="group in data.services" :key="group.group">
                        <div class="flex-1 min-w-0">
                            <h2 class="mb-2 px-1">
                                <button type="button"
                                        @click="toggleGroup(group.group)"
                                        :aria-expanded="isGroupOpen(group.group) ? 'true' : 'false'"
                                        :aria-controls="'svc-' + $id(group.group)"
                                        class="w-full text-xs font-bold uppercase tracking-wider flex items-center justify-between gap-2 focus:outline-none focus:ring-1 rounded-sm hover:opacity-80 transition-opacity duration-200 ease-out"
                                        style="color: var(--accent);">
                                    <span x-text="group.group" class="truncate flex-1 text-left"></span>
                                    <svg class="w-3 h-3 shrink-0 transition-transform duration-200 ease-out"
                                         :class="isGroupOpen(group.group) ? 'rotate-180' : 'rotate-0'"
                                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                         aria-hidden="true">
                                        <path d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </button>
                            </h2>
                            <div :id="'svc-' + $id(group.group)"
                                 x-show="isGroupOpen(group.group)"
                                 x-collapse
                                 class="space-y-1.5">
                                <template x-for="svc in group.items" :key="svc.name">
                                    <a :href="svc.url" target="_blank" rel="noopener"
                                       class="link-card flex items-center gap-2 border rounded p-2 text-sm no-underline"
                                       style="background-color: var(--card-bg); border-color: var(--card-border); border-left-color: var(--stat-disk); color: var(--fg-color);">
                                        <!-- Service icon with skeleton loader, fade-in and reactive fallback -->
                                            <!-- Skeleton placeholder (shown while icon is loading) -->
                                            <div x-show="svc.icon && !svc._iconFailed && !svc._iconLoaded"
                                                 class="skeleton-icon w-6 h-6 rounded shrink-0"></div>
                                            <!-- The actual icon (hidden until loaded) -->
                                            <img x-show="svc.icon && !svc._iconFailed && svc._iconLoaded"
                                                 :src="svc.icon" :alt="svc.name"
                                                 class="icon-fade-in w-6 h-6 rounded shrink-0 object-contain"
                                                 style="background-color: var(--card-bg);"
                                                 @load="$el.classList.add('loaded'); svc._iconLoaded = true"
                                                 @error="svc._iconFailed = true; svc._iconLoaded = true">
                                            <!-- Fallback monogram (no icon or load failed) -->
                                            <span x-show="!svc.icon || svc._iconFailed"
                                                  class="w-6 h-6 flex items-center justify-center rounded text-xs font-bold shrink-0"
                                                  style="background-color: var(--accent); color: var(--bg-color);"
                                                  x-text="svc.name.substring(0,2).toUpperCase()"></span>
                                        <div class="min-w-0 flex-1">
                                            <div class="font-semibold truncate" x-text="svc.name"></div>
                                            <div class="text-xs truncate"
                                                 style="color: var(--subtle-color);"
                                                 x-text="svc.description || ''"></div>
                                        </div>
                                    </a>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Empty State -->
            <section class="w-full flex items-center justify-center p-8"
                     x-show="!data || ((!data.bookmarks || data.bookmarks.length === 0) && (!data.services || data.services.length === 0))">
                <div class="text-center" style="color: var(--subtle-color);">
                    <p class="text-lg font-medium">No data loaded</p>
                    <p class="text-sm">Configure your homepage via the API.</p>
                </div>
            </section>
        </main>

        <!-- Bottom Stats Bar -->
        <footer class="shrink-0 px-3 py-2 border-t flex flex-wrap items-center gap-2 text-xs"
                style="border-color: var(--card-border); background-color: var(--card-bg); color: var(--fg-color);">

            <!-- Stats Cards (Left) -->
            <div class="flex items-center gap-2 flex-1 ml-2">

                <!-- CPU Card -->
                <div class="stat-card flex items-center gap-1.5 border rounded px-2.5 py-1.5 min-w-[90px]"
                     style="border-color: var(--card-border); background-color: var(--bg-color);">
                    <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--stat-cpu);">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <rect x="9" y="9" width="6" height="6"/>
                        <line x1="9" y1="1" x2="9" y2="4"/>
                        <line x1="15" y1="1" x2="15" y2="4"/>
                        <line x1="9" y1="20" x2="9" y2="23"/>
                        <line x1="15" y1="20" x2="15" y2="23"/>
                        <line x1="20" y1="9" x2="23" y2="9"/>
                        <line x1="20" y1="14" x2="23" y2="14"/>
                        <line x1="1" y1="9" x2="4" y2="9"/>
                        <line x1="1" y1="14" x2="4" y2="14"/>
                    </svg>                            <div class="flex flex-col leading-tight">
                        <span class="font-mono font-bold text-xs inline-block text-right" style="color: var(--stat-cpu); min-width: 4ch;" x-text="(stats?.cpu ?? 0) + '%'"></span>
                        <!-- Mini progress bar -->
                        <div class="w-full h-0.5 rounded-full mt-0.5" style="background-color: var(--card-border);">
                            <div class="stat-bar h-full rounded-full"
                                 :style="(() => { const pct = stats?.cpu ?? 0; const color = pct >= 80 ? '#ef4444' : pct >= 50 ? '#eab308' : '#22c55e'; return 'width: ' + Math.min(pct, 100) + '%; background-color: ' + color; })()"></div>
                        </div>
                    </div>
                </div>

                <!-- RAM Card -->
                <div class="stat-card flex items-center gap-1.5 border rounded px-2.5 py-1.5 min-w-[110px]"
                     style="border-color: var(--card-border); background-color: var(--bg-color);">
                    <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--stat-ram);">
                        <rect x="4" y="6" width="16" height="12" rx="2"/>
                        <line x1="9" y1="10" x2="15" y2="10"/>
                        <line x1="9" y1="14" x2="15" y2="14"/>
                    </svg>
                    <div class="flex flex-col leading-tight">
                        <span class="font-mono font-bold text-xs" style="color: var(--stat-ram);"
                              x-text="stats?.memory ? stats.memory.used.toFixed(1) + ' / ' + stats.memory.total.toFixed(0) + ' GB' : '-- / -- GB'"></span>
                        <!-- Mini progress bar -->
                        <div class="w-full h-0.5 rounded-full mt-0.5" style="background-color: var(--card-border);">
                            <div class="stat-bar h-full rounded-full"
                                 :style="(() => { const pct = stats?.memory && stats.memory.total > 0 ? Math.min(stats.memory.used / stats.memory.total * 100, 100) : 0; const color = pct >= 80 ? '#ef4444' : pct >= 50 ? '#eab308' : '#22c55e'; return 'width: ' + pct + '%; background-color: ' + color; })()"></div>
                        </div>
                    </div>
                </div>

                <!-- Disk Card -->
                <div class="stat-card flex items-center gap-1.5 border rounded px-2.5 py-1.5 min-w-[110px]"
                     style="border-color: var(--card-border); background-color: var(--bg-color);">
                    <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--stat-disk);">
                        <ellipse cx="12" cy="6" rx="8" ry="3"/>
                        <path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/>
                        <path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>
                    </svg>
                    <div class="flex flex-col leading-tight">
                        <span class="font-mono font-bold text-xs" style="color: var(--stat-disk);"
                              x-text="stats?.disk ? stats.disk.used.toFixed(1) + ' / ' + stats.disk.total.toFixed(0) + ' GB' : '-- / -- GB'"></span>
                        <!-- Mini progress bar -->
                        <div class="w-full h-0.5 rounded-full mt-0.5" style="background-color: var(--card-border);">
                            <div class="stat-bar h-full rounded-full"
                                 :style="(() => { const pct = stats?.disk && stats.disk.total > 0 ? Math.min(stats.disk.used / stats.disk.total * 100, 100) : 0; const color = pct >= 80 ? '#ef4444' : pct >= 50 ? '#eab308' : '#22c55e'; return 'width: ' + pct + '%; background-color: ' + color; })()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Theme Selector (Right, before version) -->
            <div class="flex items-center gap-2">
                <label for="theme" class="hidden sm:inline text-xs" style="color: var(--subtle-color);">Theme:</label>
                <select id="theme"
                        x-effect="$el.value = theme"
                        @change="persistTheme($el.value)"
                        class="text-xs border rounded px-2 py-1 cursor-pointer"
                        style="background-color: var(--bg-color); border-color: var(--card-border); color: var(--fg-color);">
                    <template x-for="t in themes" :key="t">
                        <option :value="t" :selected="t === theme" x-text="t.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())"></option>
                    </template>
                </select>
            </div>

            <!-- Build metadata (Rightmost) — sourced from server-injected
                 internal/version.* vars populated by -ldflags at build time
                 via `make build`. Users cannot override it via homepage.yaml.
                 Compact footer label is `v<version> · <short-sha>`; hover
                 reveals full metadata (build time + Go version). -->
            <div class="font-mono text-xs cursor-help"
                 style="color: var(--subtle-color);"
                 :title="(data?.version ? 'v' + data.version : '') + (data?.gitCommit ? ' (' + data.gitCommit + ')' : '') + (data?.buildTime && data.buildTime !== 'unknown' ? ' • built ' + data.buildTime + ' UTC' : '') + (data?.goVersion && data.goVersion !== 'unknown' ? ' • ' + data.goVersion : '')"
                 x-text="(data?.version ? 'v' + data.version.replace(/^v/, '') : '') + (data?.gitCommit && data.gitCommit !== 'unknown' ? ' · ' + data.gitCommit : '')"></div>
        </footer>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('ui/assets/pwa/service-worker.js');
            });
        }
    </script>

    <!-- ===== Search Modal (global keyboard trigger: any alphanumeric key or Enter) ===== -->
    <div x-show="searchOpen" x-cloak
         @click.self="closeSearch()"
         class="search-modal-backdrop"
         role="dialog"
         aria-modal="true"
         aria-label="Search services and bookmarks">
        <div class="search-modal" @click.stop>
            <input id="search-input"
                   type="text"
                   class="search-input"
                   placeholder="Search services and bookmarks…"
                   x-model="searchQuery"
                   @input="_runSearch(searchQuery)"
                   @keydown.escape.prevent="closeSearch()"
                   @keydown.enter.prevent="_searchActivate()"
                   @keydown.down.prevent="_searchNext()"
                   @keydown.up.prevent="_searchPrev()"
                   x-init="$nextTick(() => { $el.focus(); })"
                   autocomplete="off"
                   spellcheck="false"
                   aria-label="Search query" />
            <ul class="search-results-list">
                <template x-for="(r, idx) in searchResults" :key="r.kind + ':' + (r.url || '') + ':' + r.name">
                    <li class="search-result"
                        :class="idx === searchSelectedIdx ? 'selected' : ''"
                        role="option"
                        :aria-selected="idx === searchSelectedIdx ? 'true' : 'false'"
                        @click="_searchSelect(idx); _searchActivate()"
                        @mouseenter="_searchSelect(idx)">
                        <img x-show="r.icon"
                             :src="r.icon"
                             :alt="''"
                             class="w-5 h-5 rounded shrink-0 object-contain"
                             style="background-color: var(--card-bg);"
                             @load="$el.classList.add('loaded')" />
                        <span x-show="!r.icon"
                              class="w-5 h-5 flex items-center justify-center rounded text-xs font-bold shrink-0"
                              style="background-color: var(--accent); color: var(--bg-color);"
                              x-text="(r.abbr || r.name.substring(0,2)).toUpperCase()"></span>
                        <div class="min-w-0 flex-1">
                            <div class="font-semibold truncate text-sm" x-text="r.name"></div>
                            <div class="text-xs truncate"
                                 style="color: var(--subtle-color);"
                                 x-text="r.description || ''"></div>
                        </div>
                        <span class="search-result-meta" x-text="r.group || r.kind"></span>
                    </li>
                </template>
                <li x-show="searchQuery.trim() && searchResults.length === 0" class="search-empty">
                    No results for "<span x-text="searchQuery"></span>"
                </li>
                <li x-show="!searchQuery.trim()" class="search-empty">
                    Type to search across services and bookmarks
                </li>
            </ul>
            <div class="search-hint">
                <span><kbd>↑</kbd> <kbd>↓</kbd> navigate</span>
                <span><kbd>↵</kbd> open</span>
                <span><kbd>Esc</kbd> close</span>
            </div>
        </div>
    </div>
</body>
</html>
