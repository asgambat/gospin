name: Go Tests & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Explicit minimal permissions: both jobs only checkout source and run
# go vet / lint / tests. No write access to the repository or other
# GitHub resources is required.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Use the version pinned in go.mod so the toolchain matches the
          # minimum required by module dependencies.
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Cache staticcheck
        uses: actions/cache@v4
        # Including go.mod in the cache key ensures the cached binary is
        # invalidated when the Go toolchain version (declared in go.mod)
        # changes — preventing reuse of staticcheck binaries built with
        # an older Go version that fail on newer module code.
        with:
          path: ~/go/bin/staticcheck
          key: staticcheck-2025.1.1-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            staticcheck-2025.1.1-${{ runner.os }}-

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-1.64.8-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            golangci-lint-1.64.8-${{ runner.os }}-

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Use the version pinned in go.mod so the toolchain matches the
          # minimum required by module dependencies.
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        env:
          CGO_ENABLED: 1
        run: go test -race ./...
