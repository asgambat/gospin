name: Go Tests & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Cache staticcheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/staticcheck
          key: staticcheck-2025.1.1-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            staticcheck-2025.1.1-${{ runner.os }}-

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-1.64.8-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            golangci-lint-1.64.8-${{ runner.os }}-

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        env:
          CGO_ENABLED: 1
        run: go test -race ./...
