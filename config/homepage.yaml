settings:
  theme: catppuccin-latte
  title: SGAMBATO HOME
  title_font_size: "1.5rem"
  # NOTE: software version is NOT user-configurable. It is injected server-side
  # from internal/version.Version (overridable at build time via -ldflags).
  font_family: "Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  font_size: "19px"
  polling_interval_seconds: 10
  stats_polling_interval_seconds: 3
